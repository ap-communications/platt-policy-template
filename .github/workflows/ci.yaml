name: CI
on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * 4'

jobs:
  build:
    name: Continuous Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: latest

      - name: Set up Regal
        uses: StyraInc/setup-regal@33a142b1189004e0f14bf42b15972c67eecce776 # v1.0.0
        with:
          version: latest

      - name: format
        run: |
          opa fmt policies --fail --diff
          opa fmt samples --fail --diff
      - name: check
        run: opa check policies samples
      - name: lint
        run: regal lint --format=github policies samples
      - name: test
        run: opa test -v policies samples
